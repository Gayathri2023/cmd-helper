name: Ruff
on: [push, pull_request]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          # Optional: specify arguments (defaults to "check")
          args: "check"
          # Optional: specify version (defaults to latest)
          version: "latest"
