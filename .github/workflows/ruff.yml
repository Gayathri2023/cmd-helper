name: Ruff Check
on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: [actions/setup-python@v5](https://github.com)
        with:
          python-version: "3.13"
      - uses: [astral-sh/ruff-action@v3](https://github.com/astral-sh/ruff-action)
        with:
          # Optional: specify arguments like --fix or --select
          args: "check"
